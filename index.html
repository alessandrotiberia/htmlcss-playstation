<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playstation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="./styles/index.css">
</head>

<body>
    <header class="sony-bar d-flex justify-content-end align-items-center px-3">
        <span class="sony-text">SONY</span>
    </header>

    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
        <div class="container-fluid">

            <a class="navbar-brand" href="#">
                <img src="https://upload.wikimedia.org/wikipedia/commons/4/4e/Playstation_logo_colour.svg" alt="PS Logo"
                    width="30" height="30">
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipale"
                aria-controls="menuPrincipale" aria-expanded="false" aria-label="Apri menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menuPrincipale">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 fw-bold">
                    <li class="nav-item">
                        <a class="nav-link" href="#">Giochi</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Hardware</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Servizi</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Novità</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Fai acquisti</a>
                    </li>
                </ul>
            </div>

        </div>
    </nav>
    <section class="position-relative">

        <img src="./img/jumbo-bg.png" alt="Sfondo Returnal" class="w-100" style="min-height: 500px; object-fit: cover;">

        <div class="position-absolute top-0 start-0 w-100 h-100 d-flex align-items-center text-white">
            <div class="container-fluid px-4">
                <div class="row"> <!--div con dentro foto titolo e paragrafo-->
                    <div class="col-12 col-md-8 col-lg-6 hero-content">

                        <h2 class="mb-2 text-warning text-uppercase" style="letter-spacing: 2px; font-weight: bold;">
                            returnal</h2>

                        <h1 class="display-4 fw-bold mb-3">Rompi il cerchio.</h1>

                        <p class="lead mb-4 fw-bold" style="text-shadow: 2px 2px 4px black;">
                        Rialzati dopo ogni sconfitta e affronta una nuova sfida con ogni rinascita.
                        In questo esplosivo thriller fantascientifico, disponibile in esclusiva su ps5</p>

                        <a href="#" class="btn rounded-pill fw-bold px-4 py-2"
                            style="background-color: red; color: white;">Acquista ora</a>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</html>
